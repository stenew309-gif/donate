<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

/* 🔥 WRAPPER FULLSCREEN (FIX OBS CENTER) */
#wrapper {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: center;

  pointer-events: none;
}

/* 🔥 BOX (RESPONSIVE SIZE) */
#box {
  width: 40vw;
  max-width: 650px;

  padding: 20px 30px;

  border-radius: 18px;
  overflow: hidden;

  color: white;

  opacity: 0;
  transform: scale(0.6);

  transition: 
    transform 0.5s cubic-bezier(.2,1.2,.3,1),
    opacity 0.4s ease;

  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

#box.show {
  opacity: 1;
  transform: scale(1);

  animation: glowPulse 1.2s ease;
}

#box::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.55)
  );
  z-index: 1;
  border-radius: 18px;
}

.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) blur(1px);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.top {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.amount { color: #ff7aa5; }
.name { color: #ff7aa5; }

.message {
  font-size: 16px;
  margin-top: 5px;
  opacity: 0.95;
}

.mascot {
  position: absolute;
  right: -30px;
  bottom: -20px;
  z-index: 2;
}

.mascot img {
  width: 120px;
  opacity: 0.9;
}

@keyframes glowPulse {
  0% {
    box-shadow:
      0 0 0 rgba(255, 122, 165, 0),
      0 10px 40px rgba(0,0,0,0.8);
  }

  50% {
    box-shadow:
      0 0 25px rgba(255, 122, 165, 0.6),
      0 10px 40px rgba(0,0,0,0.8);
  }

  100% {
    box-shadow:
      0 0 0 rgba(255, 122, 165, 0),
      0 10px 40px rgba(0,0,0,0.8);
  }
}
</style>
</head>

<body>

<!-- 🔥 WRAPPER -->
<div id="wrapper">

  <div id="box">

    <img src="https://ik.imagekit.io/avux/SaweriaOverlay/bg_sakura.jpg" class="bg">

    <div class="content">
      <div class="top">
        <span class="amount" id="amount"></span>
        Dari
        <span class="name" id="name"></span>
      </div>

      <div class="message" id="message"></div>
    </div>

    <div class="mascot">
      <img src="https://ik.imagekit.io/avux/SaweriaOverlay/sakura.png">
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
window.onload = () => {

  const socket = io();
  const box = document.getElementById("box");

  let queue = [];
  let isPlaying = false;
  let currentAudio = null;

  function format(num){
    return Number(num || 0).toLocaleString("id-ID");
  }

  function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
  }

  // 🔥 TTS NAHIDA
  function speakNahida(text) {
    return new Promise(async (resolve) => {
      try {
        const url = "https://elianacharoline-api.vercel.app/tools/text-to-speech?apikey=ugaliuwt87t8wq98ysg98ay&model=nahida&text=" + encodeURIComponent(text);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.result?.length) return resolve();

        if (currentAudio) currentAudio.pause();

        const audio = new Audio(data.result[0].url);
        currentAudio = audio;

        audio.onended = resolve;
        await audio.play();

      } catch {
        resolve();
      }
    });
  }

  // 🔥 LISTEN TANPA MEDIA
  socket.on("donation", (d)=>{
    queue.push(d);
    processQueue();
  });

  async function processQueue(){
    if(isPlaying) return;
    if(!queue.length) return;

    isPlaying = true;

    const data = queue.shift();

    document.getElementById("name").innerText = data.name;
    document.getElementById("message").innerText = data.message;
    document.getElementById("amount").innerText =
      "Rp " + format(data.amount_original);

    box.classList.add("show");

    await speakNahida(`${data.name} donasi ${format(data.amount_original)} rupiah. Pesan. ${data.message}`);

    await sleep(3000);

    box.classList.remove("show");

    isPlaying = false;
    processQueue();
  }

};
</script>

</body>
</html>
